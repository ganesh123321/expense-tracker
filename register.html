<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ExpenseTrackerPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { inc: '#10b981', exp: '#ef4444' } }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="max-w-md w-full flex flex-col gap-6">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-4">
            <ion-icon name="wallet" class="text-blue-600 text-4xl"></ion-icon>
            <h1 class="text-3xl font-bold">ExpenseTracker<span class="text-blue-600">Pro</span></h1>
        </div>

        <!-- Register Card -->
        <section class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-2 text-center text-gray-900">Create an Account</h2>
            <p class="text-center text-gray-500 mb-8">Join the secure ExpenseTrackerPro</p>
            
            <form id="registerForm" class="flex flex-col gap-5">
                <div>
                    <input type="email" id="email" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="Email Address" required />
                </div>
                <div>
                    <input type="password" id="password" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="Password" required />
                </div>
                <div>
                    <input type="password" id="confirmPassword" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="Confirm Password" required />
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-2 transition-colors">Register</button>
            </form>
            
            <p class="mt-6 text-center text-gray-600">
                Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Login here</a>
            </p>
        </section>
    </div>

    <!-- Ionicons for the wallet icon -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <!-- Include the auth functions -->
    <script src="auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // Call register function from auth.js
            register(email, password);
        });
    </script>
</body>
</html>
