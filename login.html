<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExpenseTrackerPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { inc: '#10b981', exp: '#ef4444' } }
            }
        }
    </script>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <style>
        body {
            background: radial-gradient(circle at top left, #3D0B0D 0%, #0F0304 100%);
            background-attachment: fixed;
            color: #F9FAFB;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        input {
            background: rgba(0, 0, 0, 0.2) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus {
            border-color: #C21820 !important;
            box-shadow: 0 0 0 2px rgba(194, 24, 32, 0.2) !important;
            outline: none !important;
        }
        .aquipt-red { color: #C21820; }
        .bg-aquipt-red { background-color: #C21820; }
        .hover-bg-red:hover { background-color: #A00F1A; }
    </style>
    
    <div class="max-w-md w-full flex flex-col gap-6">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-4">
            <ion-icon name="wallet" class="aquipt-red text-4xl"></ion-icon>
            <h1 class="text-3xl font-bold text-white">ExpenseTracker<span class="aquipt-red">Pro</span></h1>
        </div>

        <!-- Login Card -->
        <section class="glass-card p-10 rounded-3xl">
            <h2 class="text-2xl font-bold mb-2 text-center text-white">Welcome Back</h2>
            <p class="text-center text-gray-400 mb-8">Login to your expense tracker</p>
            
            <form id="loginForm" class="flex flex-col gap-5">
                <div>
                    <input type="email" id="email" class="w-full px-5 py-4 border rounded-xl" placeholder="Email Address" required />
                </div>
                <div>
                    <input type="password" id="password" class="w-full px-5 py-4 border rounded-xl" placeholder="Password" required />
                </div>
                
                <button type="submit" class="w-full bg-aquipt-red hover-bg-red text-white font-bold py-4 rounded-xl mt-2 transition-all transform hover:-translate-y-1 shadow-[0_4px_15px_rgba(194,24,32,0.4)]">Login</button>
            </form>
            
            <p class="mt-8 text-center text-gray-400">
                Don't have an account? <a href="register.html" class="aquipt-red font-semibold hover:underline">Register here</a>
            </p>
        </section>
    </div>

    <!-- Ionicons for the wallet icon -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <!-- Include the auth functions -->
    <script src="auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Call login function from auth.js
            login(email, password);
        });
    </script>
</body>
</html>
