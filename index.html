<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTrackerPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        inc: '#10b981', 
                        exp: '#C21820',
                        aquipt: {
                            bg: '#0F0304',
                            burgundy: '#3D0B0D',
                            red: '#C21820',
                            card: 'rgba(25, 15, 15, 0.6)'
                        }
                    } 
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top left, #3D0B0D 0%, #0F0304 100%);
            background-attachment: fixed;
            color: #F9FAFB;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        input, select {
            background: rgba(0, 0, 0, 0.2) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, select:focus {
            border-color: #C21820 !important;
            box-shadow: 0 0 0 2px rgba(194, 24, 32, 0.2) !important;
            outline: none !important;
        }
        .filter-btn.active { background-color: #C21820 !important; color: white !important; }
    </style>
</head>
<body class="font-sans min-h-screen">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col gap-6">
        <nav class="flex items-center justify-between glass-card px-6 py-4 rounded-3xl">
            <div class="flex items-center gap-2">
                <ion-icon name="wallet" class="text-aquipt-red text-3xl"></ion-icon>
                <h1 class="text-xl font-bold">ExpenseTracker<span class="text-aquipt-red">Pro</span></h1>
            </div>
            <button onclick="logout()" class="bg-aquipt-red hover:bg-red-800 text-white px-5 py-2 rounded-full font-bold text-sm transition-colors shadow-lg shadow-aquipt-red/30">Logout</button>
        </nav>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 flex flex-col gap-6">
                <!-- Summary -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 rounded-3xl text-center transform transition hover:-translate-y-1">
                        <p class="text-sm font-medium tracking-wide text-gray-400">Balance</p>
                        <h2 id="balance" class="text-4xl font-extrabold text-white mt-1">₹0.00</h2>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-l-inc text-center transform transition hover:-translate-y-1">
                        <p class="text-sm font-medium text-gray-400">Income</p>
                        <h3 id="money-plus" class="text-2xl font-bold text-inc mt-1">₹0.00</h3>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-l-exp text-center transform transition hover:-translate-y-1">
                        <p class="text-sm font-medium text-gray-400">Expense</p>
                        <h3 id="money-minus" class="text-2xl font-bold text-exp mt-1">₹0.00</h3>
                    </div>
                </div>
                <!-- Charts -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6 rounded-3xl"><canvas id="expensePieChart"></canvas></div>
                    <div class="glass-card p-6 rounded-3xl"><canvas id="spendingBarChart"></canvas></div>
                </div>
                <!-- Form -->
                <section class="glass-card p-6 rounded-3xl">
                    <h2 class="text-xl font-bold mb-5 text-white">Add Transaction</h2>
                    <form id="form" class="flex flex-col gap-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <input type="text" id="text" class="px-5 py-3 border rounded-xl" placeholder="Description" required />
                            <input type="number" id="amount" class="px-5 py-3 border rounded-xl" placeholder="Amount (- for exp)" step="0.01" required />
                            <select id="category" class="px-5 py-3 border rounded-xl">
                                <option value="Food" class="text-black">Food</option>
                                <option value="Travel" class="text-black">Travel</option>
                                <option value="Bills" class="text-black">Bills</option>
                                <option value="Shopping" class="text-black">Shopping</option>
                                <option value="Salary" class="text-black">Salary</option>
                                <option value="Others" class="text-black">Others</option>
                            </select>
                            <input type="date" id="date" class="px-5 py-3 border rounded-xl" required />
                        </div>
                        <button type="submit" class="bg-aquipt-red hover:bg-red-800 text-white font-bold py-3 rounded-xl shadow-[0_4px_15px_rgba(194,24,32,0.4)] transition-all transform hover:-translate-y-1">Add Transaction</button>
                    </form>
                </section>
            </div>
            <!-- Transactions -->
            <!-- Transactions -->
            <div class="glass-card p-6 rounded-3xl flex flex-col h-[700px]">
                <h2 class="text-xl font-bold mb-4 text-white">Recent Transactions</h2>
                <input type="text" id="searchInput" class="w-full px-5 py-3 border rounded-xl mb-5" placeholder="Search..."/>
                <div class="flex flex-wrap gap-2 mb-5">
                    <button class="filter-btn active bg-aquipt-red text-white px-4 py-1.5 rounded-full text-sm font-semibold transition" data-filter="all">All</button>
                    <button class="filter-btn bg-white/10 hover:bg-white/20 text-gray-300 px-4 py-1.5 rounded-full text-sm font-semibold transition border border-white/5" data-filter="income">Income</button>
                    <button class="filter-btn bg-white/10 hover:bg-white/20 text-gray-300 px-4 py-1.5 rounded-full text-sm font-semibold transition border border-white/5" data-filter="expense">Expense</button>
                    <button class="filter-btn bg-white/10 hover:bg-white/20 text-gray-300 px-4 py-1.5 rounded-full text-sm font-semibold transition border border-white/5" data-filter="cat-Food">Food</button>
                    <button class="filter-btn bg-white/10 hover:bg-white/20 text-gray-300 px-4 py-1.5 rounded-full text-sm font-semibold transition border border-white/5" data-filter="cat-Travel">Travel</button>
                </div>
                <!-- Adding custom style for scrollbar -->
                <style>
                    #list::-webkit-scrollbar { width: 4px; }
                    #list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
                </style>
                <ul id="list" class="flex flex-col gap-3 overflow-y-auto w-full pr-2"></ul>
            </div>
        </div>
    </div>
    <!-- Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white p-6 rounded-2xl text-center">
            <h3 class="text-lg font-bold mb-2">Delete?</h3>
            <div class="flex justify-center gap-3 mt-4">
                <button id="cancelDeleteBtn" class="px-4 py-2 bg-gray-200 rounded-lg text-black">Cancel</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-500 rounded-lg text-white">Delete</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
