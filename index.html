<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="top-nav">
            <a href="index.html" class="active">Wallet</a>
            <a href="analytics.html">Analytics</a>
        </nav>
        <!-- Header / Overview Section -->
        <header class="overview-section">
            <div class="balance-wrapper">
                <p class="balance-label">Total Balance</p>
                <h1 id="balance" class="balance-amount">₹0.00</h1>
            </div>
            <div class="summary-cards">
                <div class="summary-card income">
                    <div class="icon-wrapper"><ion-icon name="arrow-down-outline"></ion-icon></div>
                    <div class="summary-info">
                        <p>Income</p>
                        <h3 id="money-plus">₹0.00</h3>
                    </div>
                </div>
                <div class="summary-card expense">
                    <div class="icon-wrapper"><ion-icon name="arrow-up-outline"></ion-icon></div>
                    <div class="summary-info">
                        <p>Expense</p>
                        <h3 id="money-minus">₹0.00</h3>
                    </div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </header>
        <!-- Transactions Section -->
        <section class="transactions-section">
            <div class="section-header">
                <h2>Transactions</h2>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="income">Incomes</button>
                    <button class="filter-btn" data-filter="expense">Expenses</button>
                </div>
            </div>
            <ul id="list" class="transaction-list">
                <!-- Transactions dynamically generated -->
            </ul>
        </section>
        <!-- Add Transaction Form -->
        <section class="add-transaction-section">
            <h2>Add Record</h2>
            <form id="form">
                <div class="form-row">
                    <div class="form-control flex-2">
                        <label for="text">Description</label>
                        <input type="text" id="text" placeholder="e.g. Salary, Rent" required autocomplete="off" />
                    </div>
                    <div class="form-control flex-1">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="e.g. -500 or +1500" step="0.01" required autocomplete="off" />
                    </div>
                </div>
                <button type="submit" class="btn submit-btn">
                    <ion-icon name="add-circle-outline"></ion-icon> Add Transaction
                </button>
            </form>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="script.js"></script>
</body>
</html>
